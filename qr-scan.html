<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WhatsApp QR Link</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0b141a;font-family:'Segoe UI',system-ui,sans-serif;color:#e9edef}
.card{text-align:center;padding:40px}
h1{font-size:24px;margin-bottom:8px;color:#00a884}
.sub{font-size:14px;color:#8696a0;margin-bottom:24px}
#qr-box{background:#fff;border-radius:16px;padding:20px;display:inline-block;min-width:320px;min-height:320px}
#status{margin-top:16px;font-size:13px;color:#667781}
#timer{color:#00a884;font-weight:bold}
</style>
</head>
<body>
<div class="card">
<h1>Scan with WhatsApp</h1>
<p class="sub">Linked Devices &rarr; Link a Device</p>
<div id="qr-box"><canvas id="qr"></canvas></div>
<p id="status">Reading QR data from <code>qr-data.txt</code>...</p>
</div>
<script>
let lastData = '';
async function refresh() {
  try {
    const r = await fetch('qr-data.txt?t=' + Date.now());
    if (!r.ok) { document.getElementById('status').textContent = 'Waiting for qr-data.txt...'; return; }
    const data = (await r.text()).trim();
    if (data && data !== lastData) {
      lastData = data;
      const canvas = document.getElementById('qr');
      QRCode.toCanvas(canvas, data, {width:280, margin:1, color:{dark:'#000',light:'#fff'}}, function(err) {
        if (err) document.getElementById('status').textContent = 'QR render error: ' + err.message;
        else document.getElementById('status').innerHTML = 'QR updated. Scan now! Refreshes every 2s.';
      });
    }
  } catch(e) { document.getElementById('status').textContent = 'Polling... ' + e.message; }
}
refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
