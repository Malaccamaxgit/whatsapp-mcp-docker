# Site Settings
title: WhatsApp MCP Server
description: "Docker-based WhatsApp integration for AI agents — 32 MCP tools for messaging, groups, media, approvals, and more."
url: "https://malaccamaxgit.github.io"
baseurl: "/whatsapp-mcp-docker"
repository: Malaccamaxgit/whatsapp-mcp-docker

# Theme
remote_theme: just-the-docs/just-the-docs@v0.10.0

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-remote-theme

# Navigation
aux_links:
  "GitHub":
    - "https://github.com/Malaccamaxgit/whatsapp-mcp-docker"
  "Docker Hub":
    - "https://hub.docker.com/r/malaccamaxgit/whatsapp-mcp-docker"
aux_links_new_tab: true

# Search
search_enabled: true
search_tokenizer_separator: /[\s/]+/

# Footer
footer_content: "WhatsApp MCP Server — <a href=\"https://github.com/Malaccamaxgit/whatsapp-mcp-docker\">View on GitHub</a>. Built with <a href=\"https://just-the-docs.com\">Just the Docs</a>."

# Back to top
back_to_top: true
back_to_top_text: "Back to top"

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Exclude from Jekyll processing
exclude:
  - node_modules/
  - src/
  - test/
  - ".git/"
  - "*.lock"
  - docker-compose.yml
  - Dockerfile
  - "*.sh"
  - ".env*"
  - whatsapp-mcp-docker-server.yaml
  - README.md
  - PRIVACY.md
  - package.json
  - package-lock.json
  - tsconfig.json
  - ".cursor/"
  - vendor/
