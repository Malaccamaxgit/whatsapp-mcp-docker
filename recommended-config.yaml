# Recommended Configuration for WhatsApp MCP Server
#
# This file documents the recommended profile configuration values.
# Apply them with the CLI command below (replace <your-profile> with
# your actual profile name — run `docker mcp profile ls` to find it):
#
#   docker mcp profile config <your-profile> \
#     --set whatsapp-mcp-docker.rate_limit_per_min=60 \
#     --set whatsapp-mcp-docker.message_retention_days=90 \
#     --set whatsapp-mcp-docker.send_read_receipts=true \
#     --set whatsapp-mcp-docker.auto_read_receipts=true \
#     --set whatsapp-mcp-docker.presence_mode=available \
#     --set whatsapp-mcp-docker.welcome_group_name=WhatsAppMCP \
#     --set whatsapp-mcp-docker.auth_wait_for_link=false \
#     --set whatsapp-mcp-docker.auth_link_timeout_sec=120 \
#     --set whatsapp-mcp-docker.auth_poll_interval_sec=5 \
#     --set whatsapp-mcp-docker.timezone=America/Toronto
#
# PowerShell: replace \ with ` (backtick) for line continuation.
#
# NOTE: docker mcp profile config does not support --from-file or --file.
# Use the --set flags above. This file serves as a reference only.

whatsapp-mcp-docker:
  # Max outbound messages per minute (1/sec sustained).
  # WhatsApp may ban accounts that send too many messages too quickly.
  rate_limit_per_min: 60

  # Auto-delete messages and media older than this many days.
  # Set to 0 to keep messages forever (not recommended for privacy).
  message_retention_days: 90

  # Send read receipts to WhatsApp when mark_messages_read is called
  # (blue double checkmarks visible to senders).
  send_read_receipts: true

  # Auto-mark incoming messages as read immediately
  # (senders see blue checkmarks without you explicitly calling mark_messages_read).
  auto_read_receipts: true

  # Online presence status: "available" or "unavailable".
  presence_mode: available

  # WhatsApp group created on first connection for connectivity testing.
  # Set to empty string "" to disable.
  welcome_group_name: WhatsAppMCP

  # After authenticate shows pairing code/QR, return immediately without
  # waiting for device to link. Recommended for most MCP clients to avoid
  # tool-call timeouts. Set to true only in environments with no timeout.
  auth_wait_for_link: false

  # Max seconds to wait for device link when auth_wait_for_link=true.
  auth_link_timeout_sec: 120

  # Seconds between connection checks when auth_wait_for_link=true.
  auth_poll_interval_sec: 5

  # IANA timezone for approval expiry times and other displayed timestamps.
  # Full list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  timezone: America/Toronto
