name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  security-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Set up Docker Compose v2
      run: |
        # Ensure Docker Compose v2 plugin is available
        docker compose version || {
          echo "Docker Compose v2 not found, installing..."
          mkdir -p ~/.docker/cli-plugins
          curl -SL "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-linux-x86_64" -o ~/.docker/cli-plugins/docker-compose
          chmod +x ~/.docker/cli-plugins/docker-compose
        }

    - name: Run npm audit
      run: |
        echo "Running npm audit (lock-file only — native modules built inside Docker)..."
        npm audit --package-lock-only --production --audit-level=moderate || exit 1

    - name: Lint check
      run: |
        echo "Checking for common issues..."
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          console.log('Package:', pkg.name, 'v' + pkg.version);
          console.log('Dependencies:', Object.keys(pkg.dependencies || {}).length);
          console.log('Type:', pkg.type);
          if (!pkg.engines?.node) {
            console.error('WARNING: No engine constraint');
            process.exit(1);
          }
          console.log('Engine:', pkg.engines.node);
        "

    - name: Type check source files
      run: |
        echo "Running TypeScript type check..."
        npm install --include=dev
        npx tsc --noEmit
        echo "All source files type-check successfully"

    - name: Build test container
      run: |
        echo "Building tester-container..."
        docker compose --profile test build tester-container

    - name: Run tests in container
      run: |
        echo "Running unit and integration tests inside tester-container..."
        docker compose --profile test run --rm tester-container

    - name: Build production image
      run: |
        echo "Building production image..."
        docker build -t whatsapp-mcp-docker:latest .
        echo "Production build successful"
        docker images whatsapp-mcp-docker:latest --format "Size: {{.Size}}"

    - name: Security summary
      if: success()
      run: |
        echo "Security Audit Passed"
        echo ""
        echo "All checks completed successfully:"
        echo "  - No vulnerable npm dependencies"
        echo "  - Package metadata valid"
        echo "  - All source files parse"
        echo "  - Tests passed in container (no secrets in image)"
        echo "  - Production Docker build successful"
